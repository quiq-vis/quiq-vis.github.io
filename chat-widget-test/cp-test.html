<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Quiq CustomMessageStyleClasses test</title>
    <script src="https://seanc.quiq-api.com/app/chat-ui/index.js" type="text/javascript"></script>
  </head>
  <body>
    <h1>CustomMessageStyleClasses test</h1>
    <p>Init: <code>pageConfigurationId: "default"</code> + <code>styles.CustomMessageStyleClasses["custom-blue-card"]</code></p>
    <script>
      window.chat = Quiq({
        pageConfigurationId: "default",
        styles: {
          CustomMessageStyleClasses: {
            "custom-blue-card": {
              backgroundColor: "#0056b3",
              color: "#ffffff",
              border: "1px solid #004085",
              borderRadius: "8px"
            }
          }
        }
      });
    </script>
  </body>
</html>
