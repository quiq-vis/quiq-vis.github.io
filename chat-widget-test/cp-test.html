<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Quiq contactPoint init test</title>
    <script src="https://seanc.quiq-api.com/app/chat-ui/index.js" type="text/javascript"></script>
  </head>
  <body>
    <h1>contactPoint init test</h1>
    <p>Init: <code>contactPoint: "default"</code> + <code>customStylesheet: cp-test.css</code></p>
    <script>
      window.chat = Quiq({
        contactPoint: "default",
        customStylesheet: new URL("cp-test.css?v=" + Date.now(), location.href).href
      });
    </script>
  </body>
</html>
