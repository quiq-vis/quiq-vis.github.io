<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8">
<title>Quiq AI Studio — Agent Flow Containers Demo v8</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:#f0f2f5;height:100vh;display:flex;flex-direction:column;overflow:hidden}

#toolbar{
  display:flex;align-items:center;gap:10px;padding:0 16px;height:50px;
  background:#ffffff;border-bottom:1px solid #e2e8f0;flex-shrink:0;
  box-shadow:0 1px 3px rgba(0,0,0,.06)
}
.logo{display:flex;align-items:center;gap:8px;font-weight:700;font-size:14px;color:#1a202c}
.logo-icon{width:28px;height:28px;background:linear-gradient(135deg,#3182ce,#805ad5);border-radius:7px;display:flex;align-items:center;justify-content:center}
.logo-icon svg{width:16px;height:16px;stroke:white;fill:none;stroke-width:2}
.divider{width:1px;height:24px;background:#e2e8f0;margin:0 4px}
.bot-tag{display:flex;align-items:center;gap:5px;background:#edf2ff;border:1px solid #c3dafe;border-radius:5px;padding:3px 9px;font-size:12px;color:#3730a3;font-weight:500}
.spacer{flex:1}
.tb-btn{
  display:flex;align-items:center;gap:5px;
  background:#f7fafc;border:1px solid #e2e8f0;border-radius:6px;
  padding:5px 12px;font-size:12px;color:#4a5568;cursor:pointer;font-weight:500;
  transition:all .15s;white-space:nowrap
}
.tb-btn:hover{background:#edf2ff;border-color:#c3dafe;color:#3730a3}
.tb-btn.active{background:#fff5f5;border-color:#feb2b2;color:#c53030}
.tb-btn.primary{background:#3182ce;border-color:#2b6cb0;color:#fff}
.tb-btn.primary:hover{background:#2b6cb0}

#cy{
  flex:1;
  background-color:#f8f9fb;
  background-image:radial-gradient(circle,#c8d0df 1px,transparent 1px);
  background-size:22px 22px;
}
#hint{
  position:fixed;bottom:18px;left:50%;transform:translateX(-50%);
  background:rgba(255,255,255,.92);border:1px solid #e2e8f0;border-radius:8px;
  padding:7px 16px;font-size:12px;color:#718096;
  box-shadow:0 2px 8px rgba(0,0,0,.08);pointer-events:none;
  transition:opacity .4s;white-space:nowrap
}
#legend{
  position:fixed;bottom:60px;right:18px;
  background:rgba(255,255,255,.96);border:1px solid #e2e8f0;border-radius:8px;
  padding:10px 14px;font-size:11px;color:#4a5568;
  box-shadow:0 2px 8px rgba(0,0,0,.10);
  cursor:move;user-select:none;min-width:170px;z-index:100;
}
#legend h4{font-size:11px;font-weight:700;color:#1a202c;margin-bottom:8px;letter-spacing:.04em;text-transform:uppercase}
.leg-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.leg-row:last-child{margin-bottom:0}
.leg-swatch{
  width:36px;height:18px;border-radius:4px;border-width:1.5px;border-style:solid;
  background:#fff;flex-shrink:0;display:flex;align-items:center;justify-content:center;
  font-size:10px;
}
.leg-label{color:#4a5568}

#tooltip{
  position:fixed;z-index:200;pointer-events:none;
  max-width:380px;padding:12px 16px;
  background:rgba(26,32,44,.95);color:#e2e8f0;
  border:1px solid #4a5568;border-radius:8px;
  font-size:12px;line-height:1.5;font-family:'Inter',system-ui,sans-serif;
  box-shadow:0 4px 16px rgba(0,0,0,.25);
  opacity:0;transition:opacity .15s;
  display:none;
}
#tooltip.show{opacity:1;display:block}
#tooltip .tt-title{font-weight:700;font-size:13px;color:#90cdf4;margin-bottom:6px}
#tooltip .tt-type{font-size:10px;color:#a0aec0;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
#tooltip .tt-body{color:#cbd5e0}
#tooltip .tt-section{margin-top:6px;font-weight:600;color:#90cdf4;font-size:11px}
#tooltip .tt-list{margin:2px 0 0 12px;padding:0;color:#cbd5e0}
#tooltip .tt-list li{margin-bottom:1px}
</style>
</head>

// ── Hover tooltip ────────────────────────────────────────────────────────────
(function(){
  const ttEl=document.getElementById('tooltip');
  let hoverTimer=null, currentTarget=null;

  function showTooltip(e,html){
    ttEl.innerHTML=html;
    ttEl.classList.add('show');
    positionTooltip(e);
  }
  function hideTooltip(){
    clearTimeout(hoverTimer);
    hoverTimer=null;
    currentTarget=null;
    ttEl.classList.remove('show');
    ttEl.style.display='none';
  }
  function positionTooltip(e){
    const mx=e.originalEvent?e.originalEvent.clientX:e.clientX;
    const my=e.originalEvent?e.originalEvent.clientY:e.clientY;
    const pad=14;
    let left=mx+pad, top=my+pad;
    // Keep on screen
    const vw=window.innerWidth, vh=window.innerHeight;
    ttEl.style.display='block';
    const tw=ttEl.offsetWidth, th=ttEl.offsetHeight;
    if(left+tw>vw-10) left=mx-tw-pad;
    if(top+th>vh-10) top=my-th-pad;
    ttEl.style.left=left+'px';
    ttEl.style.top=top+'px';
  }

  function buildGroupHtml(gid){
    const info=GROUP_DESC[gid];
    if(!info) return null;
    return '<div class="tt-title">'+info.title+'</div>'+
      '<div class="tt-body">'+info.desc+'</div>'+
      '<div class="tt-section">Inputs</div><div class="tt-body">'+info.inputs+'</div>'+
      '<div class="tt-section">Outputs</div><div class="tt-body">'+info.outputs+'</div>';
  }
  function buildNodeHtml(nid){
    const info=NODE_DESC[nid];
    if(!info) return null;
    const el=cy.getElementById(nid);
    const ntype=el.data('type')||'';
    return '<div class="tt-title">'+el.data('rawLabel')+'</div>'+
      (ntype?'<div class="tt-type">'+ntype+'</div>':'')+
      '<div class="tt-body">'+info.desc+'</div>'+
      '<div class="tt-section">Inputs</div><div class="tt-body">'+info.inputs+'</div>'+
      '<div class="tt-section">Outputs</div><div class="tt-body">'+info.outputs+'</div>';
  }

  cy.on('mouseover','node',function(e){
    const node=e.target;
    if(node.data('isDivider')||node.data('isLaneLabel')) return;
    if(currentTarget===node.id()) return;
    clearTimeout(hoverTimer);
    currentTarget=node.id();
    hoverTimer=setTimeout(function(){
      const isGroup=node.data('isGroup');
      const html=isGroup?buildGroupHtml(node.id()):buildNodeHtml(node.id());
      if(html) showTooltip(e,html);
    },1000);
  });
  cy.on('mouseout','node',function(){ hideTooltip(); });
  cy.on('pan zoom drag',function(){ hideTooltip(); });
})();

// ── Collapse / expand ─────────────────────────────────────────────────────────
const collapsedGroups=new Set();
let errEdgesHidden=false;
let corePathMode=false;
let _vId=0;

// Groups whose label starts with a letter (not a digit) — used for core-path toggle
const letterPrefixGroups=new Set();
GROUPS.forEach(g=>{
  if(g.label && /^[A-Za-z]/.test(g.label)) letterPrefixGroups.add(g.id);
});

// Return the group ID for a node (works for both childless and group nodes)
function nodeGroup(nodeId){
  const el=cy.getElementById(nodeId);
  return el.data('parent')||nodeId;
}

function resolveEndpoint(nodeId){
  const p=cy.getElementById(nodeId).data('parent');
  return (p&&collapsedGroups.has(p))?p:nodeId;
}

function isLetterGroupEdge(srcId, tgtId){
  // An edge "touches" a letter-prefix group if either endpoint belongs to one.
  // In expanded view, internal edges (both endpoints in the same letter group) are allowed.
  if(!corePathMode) return false;
  const srcG=nodeGroup(srcId), tgtG=nodeGroup(tgtId);
  const srcIsLetter=letterPrefixGroups.has(srcG);
  const tgtIsLetter=letterPrefixGroups.has(tgtG);
  if(!srcIsLetter && !tgtIsLetter) return false;          // neither side is a letter group
  if(srcG===tgtG) return false;                           // subnet/internal edge — always allowed
  return true;                                            // cross-group edge touching a letter group
}

function rebuildVirtualEdges(){
  cy.remove('[?virtual]');
  const seen=new Set();
  cy.edges('[!virtual]').forEach(e=>{
    const src=e.data('source'),tgt=e.data('target');
    const effSrc=resolveEndpoint(src),effTgt=resolveEndpoint(tgt);
    const isErr=!!e.data('toError');
    const internal=effSrc===effTgt;
    const rerouted=effSrc!==src||effTgt!==tgt;
    const errHide=isErr&&errEdgesHidden;
    const coreHide=isLetterGroupEdge(src,tgt);
    (internal||rerouted||errHide||coreHide)?e.hide():e.show();
    if(rerouted&&!internal&&!errHide){
      // For virtual (collapsed) edges, check letter-group rule using effective endpoints
      const virtualCoreHide=corePathMode&&(letterPrefixGroups.has(effSrc)||letterPrefixGroups.has(effTgt));
      if(!virtualCoreHide){
        const k=effSrc+'\x00'+effTgt;
        if(!seen.has(k)){
          seen.add(k);
          const isCoreEdge=!letterPrefixGroups.has(effSrc)&&!letterPrefixGroups.has(effTgt)&&!isErr;
          cy.add({data:{id:'ve'+(++_vId),source:effSrc,target:effTgt,virtual:true,toError:isErr,coreEdge:isCoreEdge||undefined}});
        }
      }
    }
  });
}

// ── Canvas-based text measurement ────────────────────────────────────────────
const _measureCanvas=document.createElement('canvas');
function measureLabelPx(text,fontSize){
  const ctx=_measureCanvas.getContext('2d');
  ctx.font=`700 ${fontSize}px Inter,system-ui,sans-serif`;
  return ctx.measureText(text).width;
}

function refreshLabel(node){
  const collapsed=collapsedGroups.has(node.id());
  const count=node.children().length;
  node.data('label',(collapsed?'▶  ':'▼  ')+node.data('origLabel')+'  ['+count+']');
}

function applyCollapsedStyle(node){
  const labelText='▶  '+node.data('origLabel')+'  ['+node.children().length+']';
  // Target ~2 lines: wrap at half the single-line width (+ buffer for font variance)
  const fullW=Math.ceil(measureLabelPx(labelText,36));
  const textMaxW=Math.ceil(fullW/2)+60;
  const boxW=Math.max(textMaxW+48, node.width());
  const boxH=Math.max(120, node.height()); // enough for 2 lines at 36px
  node.style({
    'text-valign':'center','text-margin-y':0,
    'font-size':36,'text-wrap':'wrap','text-max-width':textMaxW,
    width:boxW, height:boxH
  });
}

function applyExpandedStyle(node){
  node.style({'text-valign':'top','text-margin-y':8,'font-size':11,'text-wrap':'ellipsis'});
  node.removeStyle('width height text-max-width');
}

function toggleGroup(node){
  const gid=node.id();
  const children=node.children();
  if(collapsedGroups.has(gid)){
    collapsedGroups.delete(gid);
    children.style({opacity:1,events:'yes'});
    applyExpandedStyle(node);
  }else{
    collapsedGroups.add(gid);
    children.style({opacity:0,events:'no'});
    applyCollapsedStyle(node);
  }
  rebuildVirtualEdges();
  refreshLabel(node);
}

cy.on('tap',':parent',function(e){
  if(e.target===e.cy)return;
  toggleGroup(e.target);
});

cy.nodes(':parent').forEach(n=>refreshLabel(n));

function toggleCorePath(){

}
function collapseAll(){
  cy.nodes(':parent').forEach(n=>{
    collapsedGroups.add(n.id());
    n.children().style({opacity:0,events:'no'});
    applyCollapsedStyle(n);
    refreshLabel(n);
  });
  rebuildVirtualEdges();
}
function expandAll(){
  cy.nodes(':parent').forEach(n=>{
    collapsedGroups.delete(n.id());
    n.children().style({opacity:1,events:'yes'});
    applyExpandedStyle(n);
    refreshLabel(n);
  });
  rebuildVirtualEdges();
}

// ── Position persistence ──────────────────────────────────────────────────────
const POS_KEY='quiq-v3-layout-v1';
function savePositions(){
  const pos={};
  cy.nodes(':childless').forEach(n=>{ if(!n.data('isDivider')&&!n.data('isLaneLabel')) pos[n.id()]=n.position(); });
  localStorage.setItem(POS_KEY,JSON.stringify({positions:pos,zoom:cy.zoom(),pan:cy.pan()}));
}
function loadPositions(){
  try{
    const raw=localStorage.getItem(POS_KEY);
    if(!raw)return false;
    const {positions,zoom,pan}=JSON.parse(raw);
    cy.nodes(':childless').forEach(n=>{ if(positions[n.id()])n.position(positions[n.id()]); });
    if(zoom!=null)cy.zoom(zoom);
    if(pan)cy.pan(pan);
    return true;
  }catch(e){return false;}
}
function resetLayout(){localStorage.removeItem(POS_KEY);location.reload();}

// ── Legend drag ───────────────────────────────────────────────────────────────
(function(){
  const el=document.getElementById('legend');
  let ox,oy,sx,sy,dragging=false;
  el.addEventListener('mousedown',e=>{
    dragging=true;
    const r=el.getBoundingClientRect();
    sx=e.clientX;sy=e.clientY;ox=r.left;oy=r.top;
    el.style.right='auto';el.style.bottom='auto';
    el.style.left=ox+'px';el.style.top=oy+'px';
    e.preventDefault();
  });
  document.addEventListener('mousemove',e=>{
    if(!dragging)return;
    el.style.left=(ox+e.clientX-sx)+'px';
    el.style.top=(oy+e.clientY-sy)+'px';
  });
  document.addEventListener('mouseup',()=>{ dragging=false; });
})();

function getLegendPos(){
  const r=document.getElementById('legend').getBoundingClientRect();
  return {left:Math.round(r.left),top:Math.round(r.top)};
}
function applyLegendPos(pos){
  const el=document.getElementById('legend');
  el.style.right='auto';el.style.bottom='auto';
  el.style.left=pos.left+'px';el.style.top=pos.top+'px';
}

function saveToFile(){
  // Collect current positions of all child nodes
  const pos={};
  cy.nodes(':childless').forEach(n=>{
    if(!n.data('isDivider')&&!n.data('isLaneLabel')) pos[n.id()]=n.position();
  });
  const zoom=cy.zoom(), pan=cy.pan();

  // Use the pre-Cytoscape snapshot of the original source
  let html=_originalHTML;

  const legendPos=getLegendPos();
  const marker='// ── Canvas-based text measurement';
  const block=`// ── Baked layout (saved via Save Layout button) ─────────────────────────────\nconst BAKED_LAYOUT=${JSON.stringify({positions:pos,zoom,pan,legendPos})};\n\n`;
  // Remove any previous baked layout block then insert the new one
  html=html.replace(/\/\/ ── Baked layout[\s\S]*?const BAKED_LAYOUT=.*?;\n\n/,'');
  html=html.replace(marker, block+marker);

  const blob=new Blob(['<!DOCTYPE html>\n'+html],{type:'text/html'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='demo_v3.html';
  a.click();
  URL.revokeObjectURL(a.href);
}

cy.on('dragfree','node',savePositions);
let vpTimer=null;
cy.on('zoom pan',()=>{clearTimeout(vpTimer);vpTimer=setTimeout(savePositions,400);});

// Load priority: 1) localStorage (local tweaks), 2) BAKED_LAYOUT (baked via Save Layout), 3) default fit
function loadBakedLayout(){
  if(typeof BAKED_LAYOUT==='undefined') return false;
  try{
    const {positions,zoom,pan,legendPos}=BAKED_LAYOUT;
    cy.nodes(':childless').forEach(n=>{ if(positions[n.id()])n.position(positions[n.id()]); });
    if(zoom!=null)cy.zoom(zoom);
    if(pan)cy.pan(pan);
    if(legendPos)applyLegendPos(legendPos);
    return true;
  }catch(e){return false;}
}

if(!loadPositions()&&!loadBakedLayout()) setTimeout(()=>cy.fit(undefined,60),120);
